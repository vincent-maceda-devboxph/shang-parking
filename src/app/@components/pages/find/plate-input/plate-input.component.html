<div class="flex flex-wrap gap-y-2 [ py-2 px-6 ]">
    <!-- Toast notification -->
    <div *ngIf="showToast" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-[90%] max-w-[360px] bg-red-600 text-white text-sm rounded-lg shadow-lg px-4 py-3 flex items-center justify-between">
        <span>{{ toastMessage }}</span>
        <button class="ml-3 text-white font-bold text-lg leading-none" (click)="dismissToast()">&times;</button>
    </div>

    <!-- <div class="w-full">
        <p class="w-full text-sm">Vehicle Type</p>
        <select class="w-full border p-2" name="" id="">
            <option value="1">Automobile</option>
            <option value="1">Motorcycle</option>
        </select>
    </div> -->
    <div class="w-full">
        <p class="w-full text-sm">Plate Number / Conduction Sticker</p>
        <input class="w-full border p-2" placeholder="Enter plate with no spaces e.g. NAA3784" [(ngModel)]="plateNumber" />
    </div>
    <div class="w-full py-4">
        <button (click)="onNext()" [disabled]="!plateNumber.trim()" class="w-full bg-slate-950 text-white p-2 disabled:opacity-50">Next</button>
    </div>

</div>
